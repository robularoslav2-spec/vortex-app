<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VortexWorld Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Основной стиль в темных тонах под Майнкрафт/Неон */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            color: #00FBFF; /* Твой голубой неон */
            text-shadow: 0 0 15px #00FBFF;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .server-status {
            color: #F204FF; /* Розовый акцент */
            font-size: 0.8rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        #balance-container {
            font-size: 3rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 20px #F204FF;
            margin-bottom: 30px;
        }

        /* Контейнер для монетки */
        .coin-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            cursor: pointer;
            transition: transform 0.05s;
        }

        .coin-wrapper:active {
            transform: scale(0.92);
        }

        .coin-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #00FBFF;
            box-shadow: 0 0 40px #00FBFF, inset 0 0 20px #00FBFF;
            object-fit: cover;
        }

        /* Анимация клика (+1) */
        .particle {
            position: absolute;
            color: #F204FF;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            text-shadow: 0 0 10px #F204FF;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .footer {
            margin-top: 50px;
            font-size: 0.7rem;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>VORTEX WORLD</h1>
    <div class="server-status">VERSION 1.16.5 SPIGOT</div>

    <div id="balance-container">0</div>

    <div class="coin-wrapper" id="coin" onclick="handleTap(event)">
        <img src="coin.png" alt="V" class="coin-img" onerror="this.src='https://via.placeholder.com/280/000000/00FBFF?text=TAP+V'">
    </div>

    <div class="footer">Created by robularoslav2-spec & Friend</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение на весь экран
        
        let score = localStorage.getItem('vortex_score') || 0;
        const balanceElement = document.getElementById('balance-container');
        balanceElement.innerText = score;

        function handleTap(event) {
            score++;
            balanceElement.innerText = score;
            localStorage.setItem('vortex_score', score);

            // Вибрация телефона при клике
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            // Создаем эффект +1 в месте клика
            const rect = event.currentTarget.getBoundingClientRect();
            const x = event.clientX;
            const y = event.clientY;

            createParticle(x, y);
        }

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = '+1';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.body.appendChild(p);

            setTimeout(() => p.remove(), 600);
        }
    </script>
</body>
</html>
